<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" width="380" height="110">
  <defs>
    <linearGradient id="needle-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#e8c87a"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8862a"/>
    </linearGradient>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-needle" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-thread" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── T as a Needle ──────────────────────────────────────── -->
  <!-- Needle shaft — slim, tapers to point -->
  <path d="M32 14 L32 88" stroke="url(#needle-grad)" stroke-width="2.8" stroke-linecap="round" filter="url(#glow-needle)"/>
  <!-- Crossbar -->
  <path d="M14 22 Q32 18 50 22" stroke="url(#needle-grad)" stroke-width="2.8" stroke-linecap="round" filter="url(#glow-needle)"/>
  <!-- Eye of needle — oval hole -->
  <ellipse cx="32" cy="31" rx="4" ry="5.5" fill="none" stroke="#d4a843" stroke-width="1.6" filter="url(#glow-needle)"/>
  <!-- Point of needle -->
  <path d="M30 88 Q32 96 34 88" stroke="#e8c87a" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#glow-needle)"/>
  <!-- Highlight gleam on shaft -->
  <line x1="30.5" y1="36" x2="30.5" y2="82" stroke="rgba(255,245,200,0.3)" stroke-width="0.7"/>

  <!-- ── Thread through needle eye — becomes the cursive letters ── -->
  <!-- The single thread enters through the needle eye at top
       and flows continuously to form y·l·o·r in cursive script -->

  <!-- Thread entering eye from top-left -->
  <path d="M14 18 C20 14, 26 16, 28 26"
        stroke="rgba(139,92,246,0.6)" stroke-width="1.1" fill="none" stroke-linecap="round" filter="url(#glow-thread)"/>

  <!-- Thread exits eye bottom-right, sweeps into cursive YLOR -->
  <!-- One continuous flowing path: eye exit → y → l → o → r -->
  <path d="
    M36 36
    C40 34, 44 30, 46 34
    C48 38, 50 48, 54 58
    C57 66, 60 72, 58 80
    C56 86, 52 88, 52 82
    C52 76, 56 70, 60 78

    C64 60, 68 40, 72 24
    C74 18, 76 16, 78 20
    C80 26, 80 82, 80 98

    C82 100, 86 100, 88 98
    C92 96, 96 92, 98 98

    C104 74, 108 52, 114 36
    C116 28, 120 22, 124 26
    C128 30, 128 52, 130 58
    C132 64, 136 68, 138 64
    C142 58, 144 48, 148 42
    C152 36, 158 32, 162 36
    C166 40, 166 60, 168 72
    C170 80, 172 88, 176 90

    C180 92, 186 90, 190 86
    C196 80, 198 72, 194 66
    C190 60, 182 60, 180 66
    C178 72, 182 80, 188 82
    C194 84, 200 80, 204 74
    C208 68, 210 58, 208 50
    C206 42, 200 36, 196 40

    C208 36, 216 34, 222 38
    C228 44, 228 60, 230 72
    C232 82, 236 90, 242 92
  "
  stroke="rgba(139,92,246,1)" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"
  filter="url(#glow-soft)"/>

  <!-- White highlight thread — parallel, slightly offset, lower opacity -->
  <path d="
    M37 37
    C41 35, 45 31, 47 35
    C49 39, 51 49, 55 59
    C58 67, 61 73, 59 81
    C57 87, 53 89, 53 83
    C53 77, 57 71, 61 79

    C65 61, 69 41, 73 25
    C75 19, 77 17, 79 21
    C81 27, 81 83, 81 99

    C83 101, 87 101, 89 99
    C93 97, 97 93, 99 99

    C105 75, 109 53, 115 37
    C117 29, 121 23, 125 27
    C129 31, 129 53, 131 59
    C133 65, 137 69, 139 65
    C143 59, 145 49, 149 43
    C153 37, 159 33, 163 37
    C167 41, 167 61, 169 73
    C171 81, 173 89, 177 91

    C181 93, 187 91, 191 87
    C197 81, 199 73, 195 67
    C191 61, 183 61, 181 67
    C179 73, 183 81, 189 83
    C195 85, 201 81, 205 75
    C209 69, 211 59, 209 51

    C221 39, 229 35, 235 39
  "
  stroke="rgba(255,255,255,0.15)" stroke-width="0.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stray thread tail — exits last letter, loops naturally -->
  <path d="M242 92 C248 94, 254 90, 252 84 C250 78, 244 80, 246 86"
        stroke="rgba(139,92,246,0.4)" stroke-width="1.1" fill="none" stroke-linecap="round" filter="url(#glow-thread)"/>

  <!-- ── Subtitle thread underline ───────────────────────────── -->
  <path d="M14 104 C80 100, 170 108, 255 104"
        stroke="rgba(139,92,246,0.25)" stroke-width="0.8" fill="none" stroke-linecap="round"/>
</svg>
