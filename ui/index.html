<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TYLOR — Thread Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
:root {
  --bg:      #070714;
  --font:    'JetBrains Mono', monospace;
  --c-active:  #00ffb3;
  --c-await:   #fbbf24;
  --c-run:     #a78bfa;
  --c-idle:    rgba(200,210,255,0.5);
  --c-killed:  rgba(239,80,80,0.7);
  --c-project: rgba(255,255,255,0.9);
  --c-claude:  rgba(210,168,84,0.95);
  --c-thread-silver: rgba(200,205,216,0.95);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100vw;height:100vh;overflow:hidden;
  background:var(--bg);
  background:radial-gradient(ellipse at 30% 50%, rgba(20,15,50,1) 0%, rgba(7,7,20,1) 70%);
  font-family:var(--font);
}

/* ── Chrome ── */
#chrome{
  position:fixed;top:0;left:0;right:0;height:54px;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:rgba(7,7,20,0.8);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.wm-logo{
  font-size:32px;font-weight:700;
  color:transparent;
  -webkit-text-stroke:1.6px rgba(139,92,246,1);
  filter:drop-shadow(0 0 5px rgba(139,92,246,0.8)) drop-shadow(0 0 14px rgba(139,92,246,0.35));
  letter-spacing:-1px;
}
#chrome-right{display:flex;align-items:center;gap:20px}
#legend{display:flex;gap:14px;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:9.5px;color:rgba(255,255,255,0.5);letter-spacing:.05em}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#tc{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:.06em}
#tc b{font-size:22px;font-weight:700;color:rgba(160,120,255,0.9);display:block;line-height:1;
  filter:drop-shadow(0 0 6px rgba(139,92,246,0.6))}

/* ── Back button ── */
#back-btn{
  position:fixed;top:64px;left:20px;z-index:25;
  display:none;align-items:center;gap:6px;
  background:rgba(10,10,28,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(139,92,246,0.3);border-radius:20px;
  padding:6px 14px;font-size:10px;font-weight:600;
  color:rgba(200,170,255,0.9);font-family:var(--font);
  cursor:pointer;transition:all .2s;letter-spacing:.04em;
}
#back-btn:hover{background:rgba(139,92,246,0.15);border-color:rgba(139,92,246,0.5)}
#back-btn.visible{display:flex}

/* ── SVG canvas ── */
#viz{position:fixed;top:54px;left:0;right:0;bottom:36px;z-index:1;background:transparent;overflow:hidden}

/* ── Detail panel ── */
#panel{
  position:fixed;top:54px;right:0;bottom:36px;width:420px;z-index:15;
  background:rgba(15,15,35,0.92);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-left:1px solid rgba(139,92,246,0.3);
  display:flex;flex-direction:column;
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:opacity 150ms ease, visibility 150ms ease;
}
#panel.open{opacity:1;visibility:visible;pointer-events:all}

/* Panel resize handle */
#panel-resize{
  position:absolute;left:-3px;top:0;bottom:0;width:6px;
  cursor:col-resize;z-index:16;
}
#panel-resize:hover{background:rgba(139,92,246,0.2)}

.ph{
  padding:18px 20px 14px;flex-shrink:0;
  border-bottom:1px solid rgba(139,92,246,0.12);
}
.ph-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.ph-title{font-size:16px;font-weight:700;color:rgba(255,255,255,0.95);line-height:1.3;flex:1}
.ph-close{
  background:none;border:none;color:rgba(255,255,255,0.35);
  font-family:var(--font);font-size:18px;cursor:pointer;line-height:1;
  padding:2px 4px;border-radius:4px;transition:color .15s;flex-shrink:0;
}
.ph-close:hover{color:rgba(255,255,255,0.9)}
.ph-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.ph-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;border:1px solid;
}
.ph-ts{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:.03em}
.ph-project{font-size:10px;color:rgba(255,255,255,0.25);margin-left:4px}
.ph-msg-count{font-size:10px;color:rgba(255,255,255,0.3)}

/* Load earlier button */
#load-earlier{
  flex-shrink:0;margin:10px 20px 0;
  background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.22);
  border-radius:8px;padding:7px 14px;font-size:10px;font-weight:600;
  color:rgba(200,170,255,0.85);font-family:var(--font);
  cursor:pointer;letter-spacing:.06em;transition:background .15s;
  display:none;
}
#load-earlier:hover{background:rgba(139,92,246,0.16)}

/* Messages list */
#msgs{
  flex:1;overflow-y:auto;padding:12px 20px 16px;
  display:flex;flex-direction:column;gap:12px;
  scrollbar-width:thin;scrollbar-color:rgba(139,92,246,0.2) transparent;
  position:relative;
}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:rgba(139,92,246,0.22);border-radius:2px}

/* Jump to latest */
#jump-latest{
  position:absolute;bottom:12px;right:20px;z-index:5;
  background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.4);
  border-radius:16px;padding:5px 12px;font-size:9px;font-weight:600;
  color:rgba(200,170,255,0.9);font-family:var(--font);
  cursor:pointer;display:none;transition:opacity .15s;
}
#jump-latest:hover{background:rgba(139,92,246,0.25)}

/* Message items */
.msg{
  display:flex;flex-direction:column;gap:4px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.04);
  border-radius:8px;padding:10px 12px;
  transition:border-color .2s;
}
.msg:hover{border-color:rgba(139,92,246,0.15)}
.msg-head{display:flex;align-items:center;gap:7px}
.role-chip{
  font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:2px 8px;border-radius:8px;
}
.role-user{background:rgba(0,255,179,0.1);color:rgba(0,255,179,0.85);border:1px solid rgba(0,255,179,0.25)}
.role-assistant{background:rgba(139,92,246,0.1);color:rgba(180,140,255,0.85);border:1px solid rgba(139,92,246,0.25)}
.role-tool{background:rgba(251,191,36,0.1);color:rgba(251,191,36,0.85);border:1px solid rgba(251,191,36,0.25)}
.msg-ts{font-size:9.5px;color:rgba(255,255,255,0.25)}
.msg-body{
  font-size:11.5px;line-height:1.6;color:rgba(255,255,255,0.65);
  padding-left:10px;border-left:1.5px solid rgba(255,255,255,0.07);
}
.msg-body.role-user-body{border-color:rgba(0,255,179,0.18)}
.msg-body.role-assistant-body{border-color:rgba(139,92,246,0.2)}
.msg-body p{margin:0 0 4px}
.msg-body code{font-family:var(--font);font-size:10.5px;
  background:rgba(139,92,246,0.1);padding:1px 5px;border-radius:3px}
.msg-body pre{background:rgba(0,0,0,0.3);border-radius:6px;padding:8px;
  overflow-x:auto;margin:4px 0}

/* Responsive: full-width below 900px */
@media(max-width:900px){
  #panel{width:100%;border-left:none;border-top:1px solid rgba(139,92,246,0.3)}
}

/* ── Tooltip ── */
#tip{
  position:fixed;z-index:30;display:none;pointer-events:none;
  background:rgba(8,8,22,0.95);backdrop-filter:blur(20px);
  border:1px solid rgba(139,92,246,0.3);border-radius:8px;
  padding:10px 14px;font-size:11px;font-family:var(--font);
  color:rgba(255,255,255,0.75);max-width:220px;
}
#tip strong{color:#fff;font-size:12px;display:block;margin-bottom:4px}
#tip .tr{display:flex;justify-content:space-between;gap:12px;margin-top:2px}
#tip .tl{color:rgba(255,255,255,0.35);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em}

/* ── Health ── */
#health{
  position:fixed;bottom:8px;right:16px;z-index:20;
  display:flex;align-items:center;gap:5px;
  font-size:9.5px;font-family:var(--font);color:rgba(255,255,255,0.3);
}
.hdot{width:6px;height:6px;border-radius:50%}
.hdot.ok{background:var(--c-active);box-shadow:0 0 6px rgba(0,255,179,0.5)}
.hdot.warn{background:var(--c-await)}
.hdot.err{background:rgba(239,68,68,0.9)}

/* ── Node card styles (rendered in foreignObject) ── */
.thread-card{
  width:210px;height:68px;
  background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  backdrop-filter:blur(8px);
  border-radius:10px;
  padding:8px 12px;
  display:flex;flex-direction:column;justify-content:space-between;
  cursor:pointer;
  transition:transform 260ms, box-shadow 360ms, border-color 260ms;
  overflow:hidden;
  border:1px solid rgba(200,205,216,0.12);
  box-shadow:0 6px 18px rgba(200,205,216,0.03), inset 0 1px 0 rgba(255,255,255,0.02);
  transform-origin:center;
}
.thread-card:hover{transform:scale(1.02)}
.thread-card.status-active{border:1.5px solid rgba(200,210,230,0.7);box-shadow:0 0 10px rgba(200,210,230,0.35), 0 0 24px rgba(200,210,230,0.15)}
.thread-card.status-awaiting{border:1.5px solid rgba(200,210,230,0.7);box-shadow:0 0 10px rgba(200,210,230,0.35), 0 0 24px rgba(200,210,230,0.15)}
.thread-card.status-running{border:1.5px solid rgba(200,210,230,0.7);box-shadow:0 0 10px rgba(200,210,230,0.35), 0 0 24px rgba(200,210,230,0.15)}
.thread-card.status-idle{border:1.5px solid rgba(200,210,230,0.5);box-shadow:0 0 8px rgba(200,210,230,0.2), 0 0 18px rgba(200,210,230,0.08)}
.thread-card.status-killed{border:1.5px solid rgba(200,210,230,0.35);box-shadow:0 0 6px rgba(200,210,230,0.1)}
.thread-card.current{border-width:2.5px;border-color:rgba(220,225,240,0.9);box-shadow:0 0 16px rgba(220,225,240,0.5), 0 0 36px rgba(220,225,240,0.2), inset 0 0 8px rgba(220,225,240,0.05)}
.tc-header{display:flex;align-items:center;gap:6px}
.tc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tc-name{font-size:11.5px;font-weight:600;color:rgba(255,255,255,0.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tc-preview{font-size:9.5px;color:rgba(255,255,255,0.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
.tc-footer{display:flex;align-items:center;justify-content:space-between}
.tc-msgs{font-size:8.5px;color:rgba(255,255,255,0.3)}
.tc-time{font-size:8.5px;color:rgba(255,255,255,0.3)}

.project-card{
  width:220px;height:56px;
  background:rgba(12,12,30,0.85);
  backdrop-filter:blur(8px);
  border-radius:12px;
  padding:10px 14px;
  display:flex;flex-direction:column;justify-content:center;
  cursor:pointer;
  transition:border-color 300ms, box-shadow 300ms, transform 200ms;
  overflow:hidden;
}
.project-card:hover{transform:scale(1.03)}
.pc-header{display:flex;align-items:center;gap:8px}
.pc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pc-name{font-size:12px;font-weight:700;color:rgba(255,255,255,0.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-info{font-size:9px;color:rgba(255,255,255,0.45);margin-top:3px;padding-left:18px}

.killed-card{
  width:160px;height:36px;
  background:rgba(30,6,6,0.8);
  border:1px dashed rgba(239,80,80,0.4);
  border-radius:8px;
  padding:4px 10px;
  display:flex;align-items:center;gap:6px;
  cursor:pointer;
  font-size:9.5px;color:rgba(255,140,140,0.8);font-weight:600;
}

/* ── Animations (event-driven only) ── */
@keyframes fadeSlideIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeOut{
  from{opacity:1}
  to{opacity:0;transform:scale(0.95)}
}
.node-enter{animation:fadeSlideIn 300ms ease forwards}
.node-exit{animation:fadeOut 300ms ease forwards}

/* Thread card floating + pulse */
@keyframes threadFloat{
  0%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
  100%{transform:translateY(0)}
}
@keyframes threadPulse{
  0%{box-shadow:0 6px 18px rgba(200,205,216,0.03)}
  50%{box-shadow:0 10px 28px rgba(200,205,216,0.06)}
  100%{box-shadow:0 6px 18px rgba(200,205,216,0.03)}
}
.thread-card{animation:threadFloat 6s ease-in-out infinite, threadPulse 3.5s ease-in-out infinite}

/* Animated silver connectors (links with moving dash + glow pulse) */
.silver-connector{
  stroke:rgba(200,210,230,0.85);
  stroke-width:1.8;
  stroke-linecap:round;
  fill:none;
  stroke-dasharray:8 12;
  animation:dashMove 3s linear infinite, connGlow 2.8s ease-in-out infinite;
}

@keyframes dashMove{from{stroke-dashoffset:0}to{stroke-dashoffset:-20}}
@keyframes connGlow{0%{opacity:0.65}50%{opacity:1}100%{opacity:0.75}}
</style>
</head>
<body>
</style>
</head>
<body>

<!-- Chrome -->
<div id="chrome">
  <div class="wm-logo">Tylor</div>
  <div id="chrome-right">
    <div id="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--c-active);box-shadow:0 0 5px rgba(0,255,179,0.6)"></div>active</div>
      <div class="leg"><div class="leg-dot" style="background:var(--c-await);box-shadow:0 0 5px rgba(251,191,36,0.6)"></div>awaiting</div>
      <div class="leg"><div class="leg-dot" style="background:var(--c-run)"></div>running</div>
      <div class="leg"><div class="leg-dot" style="background:rgba(200,210,255,0.45)"></div>idle</div>
      <div class="leg"><div class="leg-dot" style="background:var(--c-killed)"></div>killed</div>
    </div>
    <div id="tc"><b id="tc-n">0</b><span id="tc-l">threads</span></div>
  </div>
</div>

<!-- Back button (focused view) -->
<button id="back-btn" onclick="goHome()">← Overview</button>

<!-- Main SVG -->
<svg id="viz"></svg>

<!-- Tooltip -->
<div id="tip">
  <strong id="tip-title"></strong>
  <div class="tr"><span class="tl">project</span><span id="tip-proj"></span></div>
  <div class="tr"><span class="tl">status</span><span id="tip-status"></span></div>
  <div class="tr"><span class="tl">messages</span><span id="tip-msgs"></span></div>
</div>

<!-- Detail panel -->
<div id="panel">
  <div id="panel-resize"></div>
  <div class="ph">
    <div class="ph-top">
      <div class="ph-title" id="panel-title">Thread</div>
      <button class="ph-close" id="panel-close" onclick="closePanel()">×</button>
    </div>
    <div class="ph-meta">
      <span class="ph-badge" id="panel-badge"></span>
      <span class="ph-msg-count" id="panel-msg-count"></span>
      <span class="ph-ts" id="panel-ts"></span>
      <span class="ph-project" id="panel-project"></span>
    </div>
  </div>
  <button id="load-earlier" onclick="loadEarlier()">↑ Load earlier messages</button>
  <div id="msgs"></div>
  <button id="jump-latest" onclick="jumpToLatest()">↓ Latest</button>
</div>

<!-- Health -->
<div id="health"><div class="hdot ok" id="hdot"></div><span id="hmsg">connected</span></div>

<script>
// ── Constants ─────────────────────────────────
// Use the UI server port (8767) to match the running server.
const API = 'http://localhost:8767';
const WS  = 'ws://localhost:8767/ws/threads';

const STATUS_COLOR = {
  active:   '#00ffb3',
  awaiting: '#fbbf24',
  running:  '#a78bfa',
  idle:     'rgba(200,210,255,0.55)',
  killed:   'rgba(239,80,80,0.75)',
};

const PROJECT_COLORS = ['#64b4ff','#b4ff8c','#ffb464','#ff8cdc'];

// ── SVG setup ─────────────────────────────────
const svgEl = document.getElementById('viz');
let W = window.innerWidth, H = window.innerHeight - 54 - 36;
svgEl.setAttribute('width', W);
svgEl.setAttribute('height', H);

const svg = d3.select('#viz');

const defs = svg.append('defs');
const glowF = defs.append('filter').attr('id','link-glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
glowF.append('feGaussianBlur').attr('stdDeviation','2.5').attr('result','b');
const fm = glowF.append('feMerge');
fm.append('feMergeNode').attr('in','b');
fm.append('feMergeNode').attr('in','SourceGraphic');

const rootG = svg.append('g').attr('class','root-transform');
const linkG = rootG.append('g').attr('class','links');
const nodeG = rootG.append('g').attr('class','nodes');

// Zoom/pan behavior
const zoom = d3.zoom()
  .scaleExtent([0.2, 3])
  .on('zoom', e => rootG.attr('transform', e.transform));
svg.call(zoom);

// ── State ─────────────────────────────────────
let projects = [];
let currentThreadId = null;
let viewMode = 'home'; // 'home' or 'focused'
let focusedProjectId = null;

// ── Time formatting ───────────────────────────
function timeAgo(ts){
  if(!ts) return '';
  const t = new Date(ts).getTime();
  if(isNaN(t)) return '';
  const diff = Date.now() - t;
  const mins = Math.floor(diff/60000);
  if(mins < 1) return 'now';
  if(mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins/60);
  if(hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs/24);
  return `${days}d ago`;
}

function fmtTs(ts){
  if(!ts) return '';
  try { return new Date(ts).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch { return typeof ts === 'string' ? ts.slice(0,16).replace('T',' ') : ''; }
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ══════════════════════════════════════════════
// HOME VIEW: Claude → Project cards (overview)
// ══════════════════════════════════════════════
function renderHome(){
  linkG.selectAll('*').remove();
  nodeG.selectAll('*').remove();
  if(!projects.length) return;

  // Layout: Claude on the left, projects fanned vertically on the right
  const claudeX = 200;
  const claudeY = 300;
  const projX = 600;
  const projSpacing = 130;
  const projStartY = claudeY - ((projects.length - 1) * projSpacing) / 2;

  // Draw Claude node
  const cg = nodeG.append('g').attr('class','claude-node')
    .attr('transform', `translate(${claudeX},${claudeY})`);
  cg.append('circle').attr('r',44)
    .attr('fill','rgba(10,10,28,0.95)')
    .attr('stroke','rgba(200,210,230,0.6)')
    .attr('stroke-width',2)
    .style('filter','drop-shadow(0 0 18px rgba(200,210,230,0.4)) drop-shadow(0 0 36px rgba(200,210,230,0.15))');
  [66,54].forEach((r,i) => {
    cg.append('circle').attr('r',r)
      .attr('fill','none')
      .attr('stroke',`rgba(255,255,255,${[0.04,0.07][i]})`)
      .attr('stroke-width',1);
  });
  const fo = cg.append('foreignObject').attr('x',-24).attr('y',-24).attr('width',48).attr('height',48);
  const c = fo.append('xhtml:canvas').attr('width',48).attr('height',48).style('display','block').node();
  const lc = c.getContext('2d');
  const img = new Image();
  img.onload = () => {lc.drawImage(img,0,0,48,48);lc.globalCompositeOperation='source-atop';lc.fillStyle='rgba(255,255,255,0.95)';lc.fillRect(0,0,48,48)};
  img.onerror = () => {lc.font='bold 30px serif';lc.fillStyle='rgba(255,255,255,0.9)';lc.textAlign='center';lc.textBaseline='middle';lc.fillText('✦',24,24)};
  img.src='claude-logo.png';

  // Draw project cards + links
  projects.forEach((proj, i) => {
    const py = projStartY + i * projSpacing;
    const col = PROJECT_COLORS[i % PROJECT_COLORS.length];
    const alive = proj.threads.filter(t => t.status !== 'killed');
    const activeCount = alive.filter(t => t.status === 'active').length;
    const runningCount = alive.filter(t => t.status === 'running').length;

    // Connection line (bezier)
    const linkPath = d3.linkHorizontal()({

// FOCUSED VIEW: Single project's threads
// ══════════════════════════════════════════════
function renderFocused(){
  linkG.selectAll('*').remove();
  nodeG.selectAll('*').remove();

  const proj = projects.find(p => p.id === focusedProjectId);
  if(!proj) { goHome(); return; }

  const pi = projects.indexOf(proj);
  const col = PROJECT_COLORS[pi % PROJECT_COLORS.length];
  const alive = proj.threads.filter(t => t.status !== 'killed');
  const killed = proj.threads.filter(t => t.status === 'killed');

  // Build a simple tree: project hub on left, threads on right
  const hubX = 140;
  const hubY = H * 0.5;
  const threadX = 460;
  const threadSpacing = 78;
  const totalThreads = alive.length + (killed.length ? 1 : 0);
  const startY = hubY - ((totalThreads - 1) * threadSpacing) / 2;

  // Project hub node
  const pg = nodeG.append('g').attr('transform', `translate(${hubX},${hubY})`);
  const pfo = pg.append('foreignObject')
    .attr('x', -110).attr('y', -28).attr('width', 220).attr('height', 56);
  const pdiv = pfo.append('xhtml:div').attr('class','project-card')
    .style('border', `1.5px solid ${col}`)
    .style('border-left', `4px solid ${col}`)
    .style('box-shadow', `0 0 12px ${col}33`);
  pdiv.append('xhtml:div').attr('class','pc-header')
    .html(`<div class="pc-dot" style="background:${col};box-shadow:0 0 6px ${col}"></div><div class="pc-name">${escHtml(proj.name)}</div>`);
  const activeCount = alive.filter(t => t.status === 'active').length;
  pdiv.append('xhtml:div').attr('class','pc-info')
    .text(`${alive.length} threads · ${activeCount} active`);

  // Thread cards
  const cardW = 210, cardH = 68, glowPad = 20;
  const foW = cardW + glowPad*2, foH = cardH + glowPad*2;
  // draw threads and chain links between them
  let prevThreadPoint = null;
  alive.forEach((t, ti) => {
    const ty = startY + ti * threadSpacing;
    const isCurrent = t.id === currentThreadId;
    const safeStatus = /^[a-z]+$/.test(t.status||'') ? t.status : 'idle';
    const sc = STATUS_COLOR[safeStatus] || STATUS_COLOR.idle;

    // Link from hub to thread
    const linkPath = d3.linkHorizontal()({
      source: [hubX + 110, hubY],
      target: [threadX - 105, ty]
    });
    linkG.append('path')
      .attr('d', linkPath)
      .attr('fill', 'none')
      .attr('stroke', `rgba(200,210,255,0.2)`)
      .attr('stroke-width', 1.2);
    // animated silver overlay on hub->thread links
    linkG.append('path')
      .attr('d', linkPath)
      .attr('class', 'silver-connector')
      .attr('opacity', 0.85);

    // Chain link from previous thread to this one (so threads appear connected)
    if(prevThreadPoint){
      const chainPath = d3.linkHorizontal()({
        source: prevThreadPoint,
        target: [threadX - 105, ty]
      });
      linkG.append('path')
        .attr('d', chainPath)
        .attr('class', 'silver-connector')
        .attr('opacity', 0.95);
    }
    prevThreadPoint = [threadX - 105, ty];

    // Thread card — oversized foreignObject so box-shadow glow renders
    const tg = nodeG.append('g').attr('class','node')
      .attr('transform', `translate(${threadX},${ty})`);
    const tfo = tg.append('foreignObject')
      .attr('x', -(cardW/2 + glowPad)).attr('y', -(cardH/2 + glowPad))
      .attr('width', foW).attr('height', foH)
      .style('overflow','visible');
    const wrapper = tfo.append('xhtml:div')
      .style('width','100%').style('height','100%')
      .style('display','flex').style('align-items','center').style('justify-content','center');
    const div = wrapper.append('xhtml:div')
      .attr('class', `thread-card status-${safeStatus}${isCurrent ? ' current' : ''}`)
      .on('click', () => openPanel(t.id, t));

    div.append('xhtml:div').attr('class','tc-header')
      .html(`<div class="tc-dot" style="background:${escHtml(sc)};box-shadow:0 0 6px ${escHtml(sc)}"></div><div class="tc-name">${escHtml(t.title)}</div>`);
    div.append('xhtml:div').attr('class','tc-preview')
      .text(t.last_message || 'No messages yet');
    const footer = div.append('xhtml:div').attr('class','tc-footer');
    footer.append('xhtml:span').attr('class','tc-msgs').text(`💬 ${t.message_count || 0}`);
    footer.append('xhtml:span').attr('class','tc-time').text(timeAgo(t.created_at));
  });

  // Killed group
  if(killed.length){
    const ky = startY + alive.length * threadSpacing;
    const linkPath = d3.linkHorizontal()({
      source: [hubX + 110, hubY],
      target: [threadX - 80, ky]
    });
    linkG.append('path')
      .attr('d', linkPath)
      .attr('fill', 'none')
      .attr('stroke', 'rgba(239,80,80,0.25)')
      .attr('stroke-width', 1)
      .attr('stroke-dasharray', '4 3');

    const kg = nodeG.append('g').attr('class','node')
      .attr('transform', `translate(${threadX},${ky})`);
    const kfo = kg.append('foreignObject')
      .attr('x', -80).attr('y', -18).attr('width', 160).attr('height', 36);
    kfo.append('xhtml:div').attr('class','killed-card')
      .html(`<span>✕</span><span>${killed.length} killed threads</span>`)
      .on('click', () => openPanel(`killed_${proj.id}`, {
        title: `${killed.length} Killed Threads`,
        status: 'killed',
        created_at: killed[0]?.created_at,
        message_count: killed.reduce((s,t)=>s+(t.message_count||0),0),
      }));
  }

  // Update counter for this project
  document.getElementById('tc-n').textContent = alive.length;
  document.getElementById('tc-l').textContent = alive.length===1?'thread':'threads';

  // Fit this view
  fitToContent();
}

function fitToContent(){
  // Reset zoom to identity first so content renders at natural size,
  // then compute bounds and set the correct zoom level
  const bbox = rootG.node().getBBox();
  if(!bbox || bbox.width <= 0 || bbox.height <= 0) return;
  const pad = 80;
  const scale = Math.min((W - pad*2) / bbox.width, (H - pad*2) / bbox.height, 1.0);
  const cx = bbox.x + bbox.width / 2;
  const cy = bbox.y + bbox.height / 2;
  const tx = W/2 - cx * scale;
  const ty = H/2 - cy * scale;
  svg.transition().duration(600).ease(d3.easeCubicOut).call(
    zoom.transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

function focusProject(projId){

  viewMode = 'home';

}

function render(){

}

const BADGE_STYLE = {
  active:   'color:#00ffb3;border-color:rgba(0,255,179,0.35);background:rgba(0,255,179,0.08)',
  awaiting: 'color:#fbbf24;border-color:rgba(251,191,36,0.35);background:rgba(251,191,36,0.08)',

  killed:   'color:rgba(239,120,120,0.85);border-color:rgba(239,80,80,0.3);background:rgba(239,80,80,0.07)',
};

function roleClass(role){
  if(role==='user') return 'role-user';
  if(role==='assistant') return 'role-assistant';
  return 'role-tool';
}

function renderMessages(msgs, prepend=false){
  const container = document.getElementById('msgs');
  const frag = document.createDocumentFragment();
  msgs.forEach(m=>{
    const div = document.createElement('div');
    div.className='msg';
    const rc = roleClass(m.role||'tool');
    const bodyClass = `msg-body role-${(m.role||'tool')}-body`;
    function sanitize(html){
      const t=document.createElement('template');
      t.innerHTML=html;
      t.content.querySelectorAll('script,iframe,object,embed').forEach(el=>el.remove());
      t.content.querySelectorAll('*').forEach(el=>{
        [...el.attributes].forEach(a=>{
          if(/^on/i.test(a.name)) el.removeAttribute(a.name);
          else if((a.name==='href'||a.name==='src'||a.name==='action')&&/^(javascript|data):/i.test(a.value.trim())) el.removeAttribute(a.name);
        });
      });
      const d=document.createElement('div');d.appendChild(t.content);return d.innerHTML;
    }
    const raw = (typeof marked!=='undefined' && m.content)
      ? marked.parse(String(m.content), {breaks:true, gfm:true})
      : `<p>${String(m.content||'').replace(/</g,'&lt;')}</p>`;
    const md = sanitize(raw);
    div.innerHTML=`
      <div class="msg-head">
        <span class="role-chip ${rc}">${m.role||'tool'}</span>
        <span class="msg-ts">${fmtTs(m.timestamp)}</span>
      </div>
      <div class="${bodyClass}">${md}</div>`;
    frag.appendChild(div);
  });
  if(prepend && container.firstChild) container.insertBefore(frag, container.firstChild);
  else container.appendChild(frag);
}

async function openPanel(threadId, threadData){
  panelThreadId = threadId;
  panelOldestTs = null;
  panelHasMore = false;

  const title = threadData?.title || threadData?.name || threadId;
  const status = threadData?.status || 'idle';
  document.getElementById('panel-title').textContent = title;
  const badge = document.getElementById('panel-badge');
  badge.textContent = status;
  badge.style.cssText = BADGE_STYLE[status] || BADGE_STYLE.idle;
  document.getElementById('panel-ts').textContent = fmtTs(threadData?.created_at);
  document.getElementById('panel-msg-count').textContent = threadData?.message_count ? `${threadData.message_count} msgs` : '';

  let projName = '';
  for(const p of projects){
    if(p.threads.find(t => t.id === threadId)){ projName = p.name; break; }
  }
  document.getElementById('panel-project').textContent = projName ? `· ${projName}` : '';

  const msgs = document.getElementById('msgs');
  msgs.innerHTML = '';

  if(threadId.startsWith('killed_')){
    msgs.innerHTML='<div style="padding:20px;color:rgba(239,120,120,0.6);font-size:11px">Archived threads — no live messages.</div>';
    document.getElementById('panel').classList.add('open');
    return;
  }

  try{
    const res = await fetch(`${API}/api/threads/${threadId}/messages`);
    const data = await res.json();
    if(Array.isArray(data) && data.length>0){
      panelOldestTs = data[0].timestamp;
      panelHasMore = data.length >= 50;
      renderMessages(data);
      msgs.scrollTop = msgs.scrollHeight;
    } else {
      msgs.innerHTML='<div style="padding:20px;color:rgba(255,255,255,0.3);font-size:11px">No messages yet.</div>';
    }
  } catch(e){
    msgs.innerHTML='<div style="padding:20px;color:rgba(255,255,255,0.3);font-size:11px">Could not load messages.</div>';
  }

  document.getElementById('load-earlier').style.display = panelHasMore ? 'block' : 'none';
  document.getElementById('panel').classList.add('open');
}

async function loadEarlier(){
  if(!panelThreadId || !panelOldestTs) return;
  const btn = document.getElementById('load-earlier');
  btn.textContent = '↑ Loading…';
  btn.disabled = true;
  try{
    const url = `${API}/api/threads/${panelThreadId}/messages?before=${encodeURIComponent(panelOldestTs)}`;
    const res = await fetch(url);
    const data = await res.json();
    if(Array.isArray(data) && data.length>0){
      panelOldestTs = data[0].timestamp;
      panelHasMore = data.length >= 50;
      const msgs = document.getElementById('msgs');
      const prevH = msgs.scrollHeight;
      renderMessages(data, true);
      msgs.scrollTop = msgs.scrollHeight - prevH;
    } else {
      panelHasMore = false;
    }
  } catch(e){
    panelHasMore = false;
  }
  btn.textContent = '↑ Load earlier messages';
  btn.disabled = false;
  document.getElementById('load-earlier').style.display = panelHasMore ? 'block' : 'none';
}

function jumpToLatest(){
  const msgs = document.getElementById('msgs');
  msgs.scrollTop = msgs.scrollHeight;
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  panelThreadId = null;
}

document.getElementById('msgs').addEventListener('scroll', function(){

});

    closePanel();
  }
});

// Panel resize
(function(){
  const panel = document.getElementById('panel');
  const handle = document.getElementById('panel-resize');
  let startX, startW;
  function onMove(ev){ panel.style.width = Math.max(300, Math.min(W - 120, startW + (startX - ev.clientX))) + 'px'; }
  function onUp(){ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
  handle.addEventListener('mousedown', e=>{
    startX = e.clientX; startW = panel.offsetWidth;
    e.preventDefault();
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
})();

// ── Data application ─────────────────────────
function applyData(data){
  let incoming;
  if(data.projects) incoming = data.projects.slice(0,4);
  else if(Array.isArray(data) && data.length) incoming = [{id:'default', name:'default', threads:data}];
  else{
    currentThreadId = data.current_thread_id || null;
    render();
    return;
  }

  currentThreadId = data.current_thread_id || null;
  projects = incoming.map(p => ({...p, threads: p.threads||[]}));

  // If focused on a project that no longer exists, go home
  if(viewMode === 'focused' && !projects.find(p => p.id === focusedProjectId)){
    goHome();
    return;
  }

  render();
}

  ws.onopen=()=>{wsRetry=1000;setHealth('ok','connected')};
  ws.onmessage=e=>{

      const d=JSON.parse(e.data);
      if(d && d.projects && d.projects.length > 0) applyData(d);
      else if(d && d.threads && d.threads.length > 0) applyData({projects:[{id:'default',name:'default',threads:d.threads}], current_thread_id: d.current_thread_id||null});
    }catch(err){ console.warn('ws parse error',err); }
  };
  ws.onclose=()=>{setHealth('err','disconnected');setTimeout(connectWs,wsRetry);wsRetry=Math.min(wsRetry*2,16000)};
  ws.onerror=()=>ws.close();
}
function setHealth(s,m){
  document.getElementById('hdot').className='hdot '+s;
  document.getElementById('hmsg').textContent=m;
}

// ── Init ──────────────────────────────────────
let _touchStartX = 0;
document.addEventListener('touchstart', e=>{ _touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].clientX - _touchStartX;
  if(dx > 60 && document.getElementById('panel').classList.contains('open')) closePanel();
}, {passive:true});

async function init(){
  try {
    const res = await fetch(`${API}/api/threads`);
    const data = await res.json();
    const hasProjects = data.projects && data.projects.length > 0;
    const hasThreads = Array.isArray(data) && data.length > 0;
    if(hasProjects || hasThreads){
      applyData(data);
    } else {
      applyData({ projects: MOCK, current_thread_id: 'a1' });
      setHealth('warn','demo data');
    }
  } catch(e) {
    applyData({ projects: MOCK, current_thread_id: 'a1' });
    setHealth('warn','demo data (offline)');
  }
  // Initial fit after first render (give foreignObjects time to layout)
  svg.call(zoom.transform, d3.zoomIdentity);
  setTimeout(() => fitToContent(), 150);
  connectWs();
}
init();

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight - 54 - 36;
  svgEl.setAttribute('width', W);
  svgEl.setAttribute('height', H);
  render();
  setTimeout(() => fitToContent(), 50);
});

// Keyboard: Escape to go back / close panel
document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    if(document.getElementById('panel').classList.contains('open')) closePanel();
    else if(viewMode === 'focused') goHome();
  }
});
</script>
</body>
