<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#070714;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
  }
  .word {
    font-family:'Dancing Script',cursive;
    font-size:108px;
    font-weight:700;
    line-height:1;
    color:transparent;
    -webkit-text-stroke: 2px rgba(139,92,246,1);
    text-stroke: 2px rgba(139,92,246,1);
    filter:
      drop-shadow(0 0 6px rgba(139,92,246,0.85))
      drop-shadow(0 0 20px rgba(139,92,246,0.4))
      drop-shadow(0 0 40px rgba(139,92,246,0.15));
    letter-spacing:-2px;
  }
</style>
</head>
<body>
  <div class="word">Tylor</div>
</body>
</html>
